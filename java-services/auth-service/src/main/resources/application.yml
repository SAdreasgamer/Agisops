server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/aegisops
    username: ${DB_USER:aegisops}
    password: ${DB_PASSWORD:aegisops_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

aegisops:
  jwt:
    secret: mock-jwt-secret-key-12345678901234567890123456789012
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
