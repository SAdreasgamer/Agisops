syntax = "proto3";

package aegisops.agent;

option java_multiple_files = true;
option java_package = "com.aegisops.proto.agent";

message AgentRequest {
  string incident_id = 1;
  string prompt = 2;
  string context = 3;
}

message AgentResponse {
  string analysis = 1;
  string status = 2; // COMPLETED, FAILED, RUNNING
}

service AgentService {
  rpc ExecuteAgent (AgentRequest) returns (AgentResponse);
}
